@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
@keyframes ripple { 0%{box-shadow:0 0 0 0 rgba(255,69,58,0.2)} 70%{box-shadow:0 0 0 20px rgba(255,69,58,0)} 100%{box-shadow:0 0 0 0 rgba(255,69,58,0)} }
.gl {
  background: var(--gl); -webkit-backdrop-filter: blur(60px) saturate(220%); backdrop-filter: blur(60px) saturate(220%);

.pill { border-radius: 100px; padding: 6px 14px; display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; letter-spacing: 0.2px;}
button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; transition: all .15s cubic-bezier(0.4, 0, 0.2, 1); font-family: inherit; cursor: pointer; }

button:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  display: flex; background: rgba(255,255,255,0.85); -webkit-backdrop-filter: blur(40px) saturate(200%); backdrop-filter: blur(40px) saturate(200%);

.exec-card { background: linear-gradient(135deg, rgba(191,90,242,0.06), rgba(88,86,214,0.06)); border: 1px solid rgba(191,90,242,0.2); }

<script>
var h=htm.bind(React.createElement),us=React.useState,ur=React.useRef,ue=React.useEffect;

/* ═══ STORAGE (v11) ═══ */
var DB={
  get:function(){try{return JSON.parse(localStorage.getItem("notulen_v11")||"null")||this.def()}catch(e){return this.def()}},
  def:function(){return{history:[],set:{lang:"id-ID",key:"",provider:"groq", chunk: 30, style: "exec"}}},
  save:function(d){localStorage.setItem("notulen_v11",JSON.stringify(d))},
  addHist:function(r){var d=this.get();d.history.unshift(r);if(d.history.length>50)d.history.length=50;this.save(d)},
  delHist:function(id){var d=this.get();d.history=d.history.filter(function(x){return x.id!==id});this.save(d)},
  getSet:function(){return this.get().set},
  updSet:function(k,v){var d=this.get();d.set[k]=v;this.save(d);window.__AK=d.set.key}
};

/* ═══ TEXT FORMATTER (Auto-Rapikan Markdown & Bullet Poin) ═══ */
function FmtText(p) {
  if(!p.text) return null;
  // Pisah per baris, buang baris kosong berlebih
  var lines = p.text.split('\n').filter(function(x){return x.trim().length>0});
  
  return h`<div>
    ${lines.map(function(l, i){
      var str = l.trim();
      var isBullet = /^[-*•]\s+/.test(str);
      var isNum = /^\d+\.\s+/.test(str);
      
      // Deteksi & render teks tebal (**teks**)
      var renderBold = function(text) {
        var parts = text.split(/\*\*(.*?)\*\*/g);
        return parts.map(function(part, idx) {
          return idx % 2 === 1 ? h`<strong key=${idx} style=${{color:"#1C1C1E", fontWeight:800}}>${part}</strong>` : part;
        });
      };

      if(isBullet || isNum) {
         // Ekstrak tanda bulatan/angka
         var markerMatch = str.match(/^([-*•]|\d+\.)\s+/);
         var marker = markerMatch[0].trim();
         var content = str.substring(markerMatch[0].length).trim();
         var displayMarker = marker.replace(/[-*]/, '•'); // Pastikan selalu bulat rapi
         
         return h`<div key=${i} style=${{display:"flex", gap:12, marginBottom:8, alignItems:"flex-start", paddingLeft: 6}}>
           <span style=${{color:p.color||"#BF5AF2", fontWeight:900, minWidth:16, textAlign:"center", marginTop:1}}>${displayMarker}</span>
           <span style=${{flex:1, lineHeight:1.6, color:"#48484A", fontWeight:500}}>${renderBold(content)}</span>
         </div>`;
      } else {
         // Jika baris biasa atau judul (Heading)
         var cleanStr = str.replace(/^#+\s*/, ''); // Buang tanda pagar #
         var isHeading = cleanStr.includes('**') || cleanStr.endsWith(':');
         var mt = i === 0 ? 0 : (isHeading ? 16 : 8); // Beri jarak lebih untuk judul baru
         var mb = isHeading ? 10 : 8;
         
         return h`<div key=${i} style=${{marginBottom:mb, marginTop:mt, lineHeight:1.6, color:"#1C1C1E"}}>${renderBold(cleanStr)}</div>`;
      }
    })}
  </div>`;
}

/* ═══ ICON ═══ */
function Ic(p){
  var s=p.size||20,c=p.color||"currentColor",paths={
    mic:"M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z M19 10v2a7 7 0 0 1-14 0v-2 M12 19v4 M8 23h8",
    stop:"M6 6h12v12H6z", play:"M5 3l14 9-14 9V3z", check:"M20 6L9 17l-5-5",
    file:"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6 M16 13H8 M16 17H8 M10 9H8",
    settings:"M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z",
    trash:"M3 6h18 M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2 M10 11v6 M14 11v6",
    key:"M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4",
    sparkle:"M12 2l3 6 6 3-6 3-3 6-3-6-6-3 6-3z",
    copy:"M20 9h-9a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2z M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1",
    alert:"M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z M12 9v4 M12 17h.01",
    globe:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z M2 12h20 M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z",
    eye:"M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z",
    text:"M4 7V4h16v3 M9 20h6 M12 4v16", bot:"M12 8V4 M8 4h8 M2 14h2 M20 14h2 M15 13v2 M9 13v2 M4 8h16v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z",
    clock:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z M12 6v6l4 2",
    layers:"M12 2L2 7l10 5 10-5-10-5z M2 12l10 5 10-5 M2 17l10 5 10-5"
  };
  return h`<svg width=${s} height=${s} viewBox="0 0 24 24" fill="none" stroke=${c} strokeWidth=${p.sw||2.5} strokeLinecap="round" strokeLinejoin="round"><path d=${paths[p.name]||"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z"}/></svg>`;
}

/* ═══ API CALLS ═══ */
function transcribeAudio(audioBlob, lang, key){
  return new Promise(function(resolve, reject){
    var fd = new FormData();
    fd.append("file", audioBlob, "chunk.webm");
    fd.append("model", "whisper-large-v3-turbo");
    fd.append("response_format", "json");
    fd.append("language", lang === "id-ID" ? "id" : "en");

    fetch("https://api.groq.com/openai/v1/audio/transcriptions", { method: "POST", headers: {"Authorization": "Bearer " + key}, body: fd })
      .then(function(r){return r.json()}).then(function(d){ if(d.error) throw new Error(d.error.message); resolve(d.text); })
      .catch(function(e){reject(e.message||e)});
  });
}

function aiSummarizeChunk(text, lang, key){
  return new Promise(function(resolve, reject){
    var prompt = lang==="id-ID"
      ? "Buat ringkasan maksimal 2 poin dari transkrip ini. Mulai poin dengan tanda hubung (-). DILARANG menulis kalimat pengantar.\n\nTranskrip:\n" + text
      : "Extract max 2 key points using dash (-) bullets. NO intro sentences.\n\nTranscript:\n" + text;
    fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST", headers: {"Content-Type":"application/json","Authorization":"Bearer "+key},
      body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{role:"system",content:"You output pure markdown bullet lists only. Never converse."},{role:"user",content:prompt}], temperature: 0.2, max_tokens: 300 })
    }).then(function(r){return r.json()}).then(function(d){ if(d.error) throw new Error(d.error.message); resolve(d.choices[0].message.content); })
      .catch(function(e){reject(e.message||e)});
  });
}

function aiSummarizeOverall(text, lang, key, style){
  return new Promise(function(resolve, reject){
    var promptStr = "";
    if (style === "action") {
       promptStr = lang === "id-ID" 
         ? "Buat ringkasan rapat yang HANYA fokus pada **Tindak Lanjut (Action Items)** dan **Keputusan Final**. Gunakan poin (bullet).\n\nTranskrip:\n"
         : "Create an action-oriented summary focusing ONLY on Decisions and Action Items. Use bullets.\n\nTranscript:\n";
    } else if (style === "detail") {
       promptStr = lang === "id-ID"
         ? "Buat ringkasan mendetail secara kronologis dari semua poin yang dibahas. Gunakan **Judul** tebal dan bullet poin.\n\nTranskrip:\n"
         : "Create a DETAILED chronological summary. Use **Bold Headings** and bullets.\n\nTranscript:\n";
    } else {
       // exec (default)
       promptStr = lang === "id-ID"
         ? "Buat Ringkasan Eksekutif. Gunakan struktur tebal ini:\n**Topik Utama**\n**Keputusan**\n**Tindak Lanjut**\n\nIsi dengan bullet poin (-) di bawah setiap judul. Dilarang menulis kalimat pengantar.\n\nTranskrip:\n"
         : "Create an Executive Summary with structure:\n**Main Topics**\n**Decisions**\n**Action Items**\n\nUse bullet points. No intro text.\n\nTranscript:\n";
    }

    var prompt = promptStr + text;

    fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST", headers: {"Content-Type":"application/json","Authorization":"Bearer "+key},
      body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{role:"system",content:"You are an expert meeting summarizer. Use clean markdown formatting (bolding and list dashes). NO conversational intros."},{role:"user",content:prompt}], temperature: 0.3, max_tokens: 1500 })
    }).then(function(r){return r.json()}).then(function(d){ if(d.error) throw new Error(d.error.message); resolve(d.choices[0].message.content); })
      .catch(function(e){reject(e.message||e)});
  });
}

function fmt(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0")}

/* ═══ LEVEL METER ═══ */
function LevelMeter(p){
  var cv=ur(null),rf=ur(null);
  ue(function(){
    if(!p.an||!cv.current) return;
    var c=cv.current,x=c.getContext("2d"),da=new Uint8Array(p.an.frequencyBinCount);
    function draw(){
      rf.current=requestAnimationFrame(draw); p.an.getByteFrequencyData(da);
      var dp=devicePixelRatio||1,rc=c.getBoundingClientRect(); c.width=rc.width*dp; c.height=rc.height*dp; x.scale(dp,dp);
      var W=rc.width,H=rc.height; x.clearRect(0,0,W,H);
      var sm=0;for(var i=0;i<da.length;i++)sm+=da[i];
      var av=sm/da.length/255,bs=32,gp=4,bw=(W-(bs-1)*gp)/bs;
      for(var i=0;i<bs;i++){
        var th=(i+1)/bs,on=av>=th*0.6;
        var bh=H*0.75,yy=(H-bh)/2,xx=i*(bw+gp);
        if(on){var it=Math.min(1,(av-th*0.4)*3); x.fillStyle=i/bs>0.75?"rgba(255,69,58,"+(0.6+it*0.4)+")":i/bs>0.45?"rgba(255,159,10,"+(0.5+it*0.5)+")":"rgba(88,86,214,"+(0.4+it*0.6)+")";
        }else{x.fillStyle="rgba(0,0,0,0.06)";}
        x.beginPath(); x.roundRect(xx,yy,bw,bh,bw/2); x.fill();
      }
    }
    draw(); return function(){cancelAnimationFrame(rf.current)};
  },[p.an]);
  return h`<canvas ref=${cv} style=${{width:"100%",height:44,borderRadius:16,background:"rgba(255,255,255,0.4)",display:"block",border:"1px solid rgba(255,255,255,0.6)"}}/>`;
}

/* ═══════════════════════════════════════
   TAB: REKAM 
   ═══════════════════════════════════════ */
function RecTab(p){
  var set = p.set, updSet = p.updSet, onSaveComplete = p.onSaveComplete;
  var _isRec=us(false), isRec=_isRec[0], setRec=_isRec[1];
  var _time=us(0), time=_time[0], setTime=_time[1];
  var _title=us(""), title=_title[0], setTitle=_title[1];
  var _an=us(null), analyser=_an[0], setAn=_an[1];
  
  var _fin=us([]), fin=_fin[0], setFin=_fin[1];
  var _notes=us([]), notes=_notes[0], setNotes=_notes[1];
  var _saving=us(false), saving=_saving[0], setSaving=_saving[1];
  var _status=us(""), statusMsg=_status[0], setStatusMsg=_status[1];

  var isRecRef = ur(false), isFinalizingRef = ur(false);
  var timeRef = ur(0), pendingReqs = ur(0);
  var streamRef = ur(null), acRef = ur(null), mrRef = ur(null);
  var loopIntervalRef = ur(null), clockIntervalRef = ur(null);
  var finRef = ur([]), notesRef = ur([]), titleRef = ur("");

  function addFin(data){ setFin(function(p){ var n=p.concat([data]); finRef.current=n; return n; }); }
  function addNote(data){ setNotes(function(p){ var n=p.concat([data]); notesRef.current=n; return n; }); }

  function autoSaveIfDone() {
    if (!isRecRef.current && pendingReqs.current === 0 && !isFinalizingRef.current) {
      if (finRef.current.length === 0) { setSaving(false); return; }
      isFinalizingRef.current = true; setStatusMsg("Menyusun Ringkasan Akhir...");
      
      var finalRaw = finRef.current.map(function(x){return "[Menit "+fmt(x.time)+"] "+x.text}).join("\n\n");
      var finalSumChunk = notesRef.current.map(function(x){return "[Menit "+fmt(x.time)+"]\n"+x.text}).join("\n\n");

      // Gunakan style ringkasan yang dipilih user
      aiSummarizeOverall(finalRaw, set.lang, window.__AK, set.style)
        .then(function(overallSum){
          DB.addHist({
            id: Date.now().toString(), date: new Date().toISOString(), duration: timeRef.current,
            title: titleRef.current || ("Rapat " + new Date().toLocaleDateString("id-ID",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})),
            transcript: finalRaw, notes: finalSumChunk, overall: overallSum
          });
          setSaving(false); onSaveComplete(); resetAll();
        })
        .catch(function(err){
          alert("Gagal AI: " + err.message + "\n(Menyimpan parsial)");
          DB.addHist({ id: Date.now().toString(), date: new Date().toISOString(), duration: timeRef.current, title: titleRef.current, transcript: finalRaw, notes: finalSumChunk, overall: "Gagal memproses." });
          setSaving(false); onSaveComplete(); resetAll();
        });
    }
  }

  function processChunk(blob, startTime){
    pendingReqs.current++;
    transcribeAudio(blob, set.lang, window.__AK)
      .then(function(text){
        if(!text || text.trim().length < 5) return;
        var cleanedText = text.trim(); addFin({time: startTime, text: cleanedText, id: Date.now()});
        
        pendingReqs.current++;
        aiSummarizeChunk(cleanedText, set.lang, window.__AK)
          .then(function(summary){ addNote({time: startTime, text: summary, id: Date.now()}); })
          .catch(function(err){ console.log("AI Chunk Err:", err); })
          .finally(function(){ pendingReqs.current--; autoSaveIfDone(); });
      })
      .catch(function(err){ console.log("Whisper Err:", err); })
      .finally(function(){ pendingReqs.current--; autoSaveIfDone(); });
  }

  function startRecordingCycle(stream) {
    if(!isRecRef.current) return;
    var mr = new MediaRecorder(stream);
    var localChunks = []; var startTime = timeRef.current;
    mr.ondataavailable = function(e){ if(e.data.size > 0) localChunks.push(e.data); };
    mr.onstop = function(){ if(localChunks.length > 0) processChunk(new Blob(localChunks, {type: 'audio/webm'}), startTime); };
    mr.start(); mrRef.current = mr;
  }

  function startRec(){
    if(!window.__AK){ alert("Isi API Key Groq di Pengaturan."); return; }
    if(!navigator.mediaDevices){ alert("Browser tidak mendukung mic."); return; }
    resetAll(); isRecRef.current = true; setRec(true); titleRef.current = title;

    navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
      streamRef.current = stream;
      var ac = new (window.AudioContext||window.webkitAudioContext)(); acRef.current = ac;
      var src = ac.createMediaStreamSource(stream); var an = ac.createAnalyser();
      an.fftSize = 2048; an.smoothingTimeConstant = 0.8; src.connect(an); setAn(an);

      startRecordingCycle(stream);
      clockIntervalRef.current = setInterval(function(){ timeRef.current++; setTime(timeRef.current); }, 1000);
      
      var cDur = (set.chunk || 30) * 1000;
      loopIntervalRef.current = setInterval(function(){
        if(isRecRef.current && mrRef.current && mrRef.current.state === "recording"){
          mrRef.current.stop(); setTimeout(function(){ startRecordingCycle(streamRef.current); }, 50);
        }
      }, cDur);
    }).catch(function(e){ alert("Gagal mic: " + e.message); resetAll(); });
  }

  function stopRec(){
    isRecRef.current = false; setRec(false); setSaving(true); setStatusMsg("Memproses Transkrip...");
    clearInterval(clockIntervalRef.current); clearInterval(loopIntervalRef.current);
    if(mrRef.current && mrRef.current.state === "recording") { mrRef.current.stop(); }
    if(streamRef.current){streamRef.current.getTracks().forEach(function(t){t.stop()}); streamRef.current=null;}
    if(acRef.current&&acRef.current.state!=="closed"){acRef.current.close();} setAn(null);
    setTimeout(autoSaveIfDone, 500);
  }

  function resetAll(){
    setFin([]); setNotes([]); setTime(0); setTitle(""); setSaving(false); setStatusMsg("");
    finRef.current = []; notesRef.current = []; timeRef.current = 0; titleRef.current = "";
    pendingReqs.current = 0; isRecRef.current = false; isFinalizingRef.current = false; setRec(false);
  }

      <div style=${{fontSize:36,fontWeight:800,fontFamily:"'SF Mono',monospace",letterSpacing:-1.5,color:isRec?"#FF453A":"#1C1C1E",marginBottom:8}}>

      ${isRec && h`<div className="pill" style=${{background:"rgba(50,215,75,0.15)",color:"#32D74B",marginBottom:12}}>
        <div style=${{width:6,height:6,borderRadius:3,background:"#32D74B",animation:"pulse 1.2s infinite"}}/> Sedang Merekam...
      </div>`}

      ${saving && h`<div className="pill" style=${{background:"rgba(191,90,242,0.15)",color:"#BF5AF2",marginBottom:12}}>
        <div className="spinner" style=${{borderColor:"rgba(191,90,242,0.2)",borderTopColor:"#BF5AF2",width:12,height:12,borderWidth:2}}></div> ${statusMsg}
      </div>`}

      ${isRec && analyser ? h`<div style=${{marginBottom:16,padding:"0 8px"}}><${LevelMeter} an=${analyser}/></div>` : null}

      ${!isRec && time===0 && !saving && h`<div style=${{marginBottom:16}}>
        <input class="fi" value=${title} onInput=${function(e){setTitle(e.target.value)}} placeholder="Ketik Judul Rapat (opsional)" style=${{textAlign:"center",fontWeight:600}}/>

      <div style=${{display:"flex",gap:12}}>

          <span style=${{display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><${Ic} name="mic" size=${18} color="#FFF"/>Mulai Rapat</span>

    </div>

    <!-- PENGATURAN CEPAT -->
    ${!isRec && time===0 && !saving ? h`<div className="gl" style=${{padding:16,marginBottom:24}}>

         <div style=${{display:"flex",alignItems:"center",gap:8}}>

           ${window.__AK ? "API Aktif" : "Kosong"}

function HistTab(){

              ${new Date(item.date).toLocaleDateString("id-ID",{day:"numeric",month:"short",year:"numeric"})} · Durasi: ${fmt(item.duration)}
            </div>
          </div>
          <div style=${{width:30,height:30,borderRadius:15,background:"rgba(0,0,0,0.04)",display:"flex",alignItems:"center",justifyContent:"center"}}>
             <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8E8E93" strokeWidth="2.5" style=${{transform:isOpen?"rotate(90deg)":"none",transition:"0.3s"}}><path d="M9 18l6-6-6-6"/></svg>

        ${isOpen ? h`<div style=${{padding:"0 16px 20px",animation:"fadeIn .3s"}}>
          <div style=${{display:"flex",gap:8,marginBottom:20}}>
            <button onClick=${function(e){e.stopPropagation();del(item.id)}} style=${{display:"inline-flex",alignItems:"center",gap:6,padding:"8px 16px",borderRadius:12,background:"rgba(255,69,58,0.08)",color:"#FF453A",fontSize:12,fontWeight:700,border:"none"}}>
              <${Ic} name="trash" size=${14} color="#FF453A"/>Hapus
            </button>
          </div>

          <!-- SUMMARY KESELURUHAN -->
          ${item.overall ? h`<div style=${{marginBottom:24}}>
            <div style=${{fontSize:12,fontWeight:800,color:"#BF5AF2",textTransform:"uppercase",letterSpacing:"1px",marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
              <${Ic} name="sparkle" size=${16} color="#BF5AF2"/>Ringkasan Akhir
            </div>
            <div className="card-note exec-card" style=${{padding:"20px"}}>
              <${FmtText} text=${item.overall} color="#BF5AF2"/>
            </div>
          </div>` : null}

          <!-- TIMELINE (CHUNK SUMMARY) -->
          ${item.notes ? h`<div style=${{marginBottom:24}}>
            <div style=${{fontSize:12,fontWeight:800,color:"#5856D6",textTransform:"uppercase",letterSpacing:"1px",marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
              <${Ic} name="clock" size=${16} color="#5856D6"/>Timeline Real-time
            </div>

               <${FmtText} text=${item.notes} color="#5856D6"/>
            </div>
          </div>` : null}

          <!-- RAW AUDIO -->
          <div>
            <div style=${{fontSize:12,fontWeight:800,color:"#8E8E93",textTransform:"uppercase",letterSpacing:"1px",marginBottom:10}}>Transkrip Mentah</div>
            <div style=${{maxHeight:250,overflowY:"auto",background:"#FFF",borderRadius:16,padding:16,border:"1px solid rgba(0,0,0,0.06)",fontSize:13,lineHeight:1.6,color:"#636366",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
              ${item.transcript || "(kosong)"}

      </div>`;

/* ═══════════════════════

   ═══════════════════════ */
function App(){
  var _tab=us("rec"), tab=_tab[0], setTab=_tab[1];
  var _set=us(DB.getSet()), settings=_set[0], setSettings=_set[1];

  ue(function(){ window.__AK = settings.key; }, [settings.key]);
  function updSet(k,v){ DB.updSet(k,v); setSettings(DB.getSet()); }

  return h`<div>
    <div>
      <div style=${{display: tab==="rec" ? "block" : "none"}}><${RecTab} set=${settings} updSet=${updSet} onSaveComplete=${function(){setTab("hist")}}/></div>
      <div style=${{display: tab==="hist" ? "block" : "none"}}><${HistTab}/></div>
      <div style=${{display: tab==="set" ? "block" : "none"}}><${SetTab} set=${settings} updSet=${updSet}/></div>
    </div>

    <!-- DYNAMIC ISLAND NAVIGATION -->
    <div className="btab-container">
      <div className="btab" style=${{maxWidth: 320, width: "100%"}}>
        ${[["rec","mic","Rekam"],["hist","file","Riwayat"],["set","settings","Sistem"]].map(function(t){
          return h`<button key=${t[0]} className=${tab===t[0]?"on":""} onClick=${function(){setTab(t[0])}}>
            <${Ic} name=${t[1]} size=${22} color=${tab===t[0]?"#1C1C1E":"#8E8E93"} sw=${tab===t[0]?2.5:2}/>${t[2]}
          </button>`;
        })}
      </div>
    </div>
  </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(h`<${App}/>`);
</script>
