<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Notulen AI — Smart Meeting Notes</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{--bg:#F2F2F7;--tx:#1C1C1E;--txm:#8E8E93;--gl:rgba(255,255,255,0.65);--gb:rgba(255,255,255,0.8);--blue:#0A84FF;--red:#FF453A;--purple:#BF5AF2;--green:#32D74B;--orange:#FF9F0A;--teal:#30B0C7;--indigo:#5856D6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;min-height:100vh;background:var(--bg);background-image:radial-gradient(at 20% 0%,rgba(88,86,214,0.07) 0,transparent 50%),radial-gradient(at 80% 10%,rgba(48,176,199,0.06) 0,transparent 50%);color:var(--tx);-webkit-font-smoothing:antialiased;padding-bottom:72px;overflow-x:hidden}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes ripple{0%{box-shadow:0 0 0 0 rgba(255,69,58,0.3)}70%{box-shadow:0 0 0 16px rgba(255,69,58,0)}100%{box-shadow:0 0 0 0 rgba(255,69,58,0)}}
.gl{background:var(--gl);-webkit-backdrop-filter:blur(48px) saturate(200%);backdrop-filter:blur(48px) saturate(200%);border:1px solid var(--gb);border-radius:22px;box-shadow:0 8px 32px rgba(0,0,0,.04),inset 0 1px 1px rgba(255,255,255,.8)}
.pill{border-radius:100px;padding:3px 10px;display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700}
button{-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:transform .12s;font-family:inherit;cursor:pointer}
button:active{transform:scale(.96)}
button:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btab{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(255,255,255,0.88);-webkit-backdrop-filter:blur(40px) saturate(180%);backdrop-filter:blur(40px) saturate(180%);border-top:1px solid rgba(0,0,0,0.06);padding:4px 0 env(safe-area-inset-bottom,4px);z-index:100}
.btab button{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;font-family:inherit;font-size:9px;font-weight:600;color:#8E8E93}
.btab button.on{color:#5856D6}
.fi{font-family:inherit;font-size:14px;padding:12px 14px;border-radius:12px;border:1px solid rgba(0,0,0,0.08);background:rgba(0,0,0,0.02);outline:none;width:100%;transition:border-color .2s}
.fi:focus{border-color:rgba(88,86,214,0.5);background:#FFF}
.card-note{background:#FFF;border-radius:14px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,0.03);margin-bottom:10px;animation:slideUp .3s ease-out;border:1px solid rgba(0,0,0,0.04)}
/* Loader spinner */
.spinner {border: 3px solid rgba(88,86,214,0.2); border-top: 3px solid #5856D6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite;}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>
</head>
<body>
<div id="root"></div>
<script>
var h=htm.bind(React.createElement),us=React.useState,ur=React.useRef,ue=React.useEffect;

/* ═══ STORAGE ═══ */
var DB={
  get:function(){try{return JSON.parse(localStorage.getItem("notulen_v5")||"null")||this.def()}catch(e){return this.def()}},
  def:function(){return{history:[],set:{lang:"id-ID",key:"",provider:"groq"}}},
  save:function(d){localStorage.setItem("notulen_v5",JSON.stringify(d))},
  addHist:function(r){var d=this.get();d.history.unshift(r);if(d.history.length>50)d.history.length=50;this.save(d)},
  delHist:function(id){var d=this.get();d.history=d.history.filter(function(x){return x.id!==id});this.save(d)},
  getSet:function(){return this.get().set},
  updSet:function(k,v){var d=this.get();d.set[k]=v;this.save(d);window.__AK=d.set.key}
};

/* ═══ ICON ═══ */
function Ic(p){
  var s=p.size||20,c=p.color||"currentColor",paths={
    mic:"M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z M19 10v2a7 7 0 0 1-14 0v-2 M12 19v4 M8 23h8",
    stop:"M6 6h12v12H6z",
    play:"M5 3l14 9-14 9V3z",
    file:"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6 M16 13H8 M16 17H8 M10 9H8",
    settings:"M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z",
    check:"M20 6L9 17l-5-5",
    trash:"M3 6h18 M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2 M10 11v6 M14 11v6",
    key:"M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4",
    sparkle:"M12 2l3 6 6 3-6 3-3 6-3-6-6-3 6-3z",
    copy:"M20 9h-9a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2z M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1",
    alert:"M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z M12 9v4 M12 17h.01",
    globe:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z M2 12h20 M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z",
    eye:"M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z",
    text:"M4 7V4h16v3 M9 20h6 M12 4v16",
    bot:"M12 8V4 M8 4h8 M2 14h2 M20 14h2 M15 13v2 M9 13v2 M4 8h16v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"
  };
  return h`<svg width=${s} height=${s} viewBox="0 0 24 24" fill="none" stroke=${c} strokeWidth=${p.sw||2} strokeLinecap="round" strokeLinejoin="round"><path d=${paths[p.name]||"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z"}/></svg>`;
}

/* ═══ API CALLS ═══ */
function transcribeAudio(audioBlob, lang, key){
  return new Promise(function(resolve, reject){
    var fd = new FormData();
    // Menggunakan ekstensi umum agar kompatibel
    fd.append("file", audioBlob, "recording.m4a");
    fd.append("model", "whisper-large-v3-turbo");
    fd.append("response_format", "json");
    fd.append("language", lang === "id-ID" ? "id" : "en");

    fetch("https://api.groq.com/openai/v1/audio/transcriptions", {
      method: "POST",
      headers: {"Authorization": "Bearer " + key},
      body: fd
    }).then(function(r){return r.json()}).then(function(d){
      if(d.error) throw new Error(d.error.message);
      resolve(d.text);
    }).catch(function(e){reject(e.message||e)});
  });
}

function aiSummarize(text, lang, key){
  return new Promise(function(resolve, reject){
    var prompt = lang==="id-ID"
      ? "Ekstrak poin-poin notulen penting dari transkrip rapat ini. Singkat, padat, profesional. Format sebagai list poin bernomor (tanpa pembukaan/penutup). Transkrip:\n\n" + text
      : "Extract key meeting notes from this transcript. Professional concise numbered points. No intro/outro. Transcript:\n\n" + text;

    fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {"Content-Type":"application/json","Authorization":"Bearer "+key},
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [{role:"system",content:"You write clean, concise meeting minutes."},{role:"user",content:prompt}],
        temperature: 0.3,
        max_tokens: 1000
      })
    }).then(function(r){return r.json()}).then(function(d){
      if(d.error) throw new Error(d.error.message);
      resolve(d.choices[0].message.content);
    }).catch(function(e){reject(e.message||e)});
  });
}

/* ═══ HELPERS ═══ */
function fmt(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0")}

/* ═══ LEVEL METER ═══ */
function LevelMeter(p){
  var cv=ur(null),rf=ur(null);
  ue(function(){
    if(!p.an||!cv.current) return;
    var c=cv.current,x=c.getContext("2d"),da=new Uint8Array(p.an.frequencyBinCount);
    function draw(){
      rf.current=requestAnimationFrame(draw);
      p.an.getByteFrequencyData(da);
      var dp=devicePixelRatio||1,rc=c.getBoundingClientRect();
      c.width=rc.width*dp;c.height=rc.height*dp;x.scale(dp,dp);
      var W=rc.width,H=rc.height;x.clearRect(0,0,W,H);
      var sm=0;for(var i=0;i<da.length;i++)sm+=da[i];
      var av=sm/da.length/255,bs=36,gp=3,bw=(W-(bs-1)*gp)/bs;
      for(var i=0;i<bs;i++){
        var th=(i+1)/bs,on=av>=th*0.6;
        var bh=H*0.75,yy=(H-bh)/2,xx=i*(bw+gp);
        if(on){var it=Math.min(1,(av-th*0.4)*3);
          x.fillStyle=i/bs>0.75?"rgba(255,69,58,"+(0.5+it*0.5)+")":i/bs>0.45?"rgba(255,159,10,"+(0.4+it*0.6)+")":"rgba(88,86,214,"+(0.3+it*0.7)+")";
        }else{x.fillStyle="rgba(0,0,0,0.04)";}
        x.fillRect(xx,yy,bw,bh);
      }
    }
    draw();
    return function(){cancelAnimationFrame(rf.current)};
  },[p.an]);
  return h`<canvas ref=${cv} style=${{width:"100%",height:36,borderRadius:12,background:"rgba(255,255,255,0.4)",display:"block"}}/>`;
}

/* ═══════════════════════════════════════
   TAB: REKAM — VOICE MEMO ARCHITECTURE
   ═══════════════════════════════════════ */
function RecTab(p){
  var set = p.set, updSet = p.updSet;
  
  var _rec=us(false), isRec=_rec[0], setRec=_rec[1];
  var _time=us(0), time=_time[0], setTime=_time[1];
  var _title=us(""), title=_title[0], setTitle=_title[1];
  var _an=us(null), analyser=_an[0], setAn=_an[1];
  
  // States untuk hasil & loading
  var _ldMsg=us(""), ldMsg=_ldMsg[0], setLdMsg=_ldMsg[1];
  var _fin=us(""), fin=_fin[0], setFin=_fin[1];
  var _notes=us(""), notes=_notes[0], setNotes=_notes[1];
  var _saved=us(false), saved=_saved[0], setSaved=_saved[1];

  var mrRef = ur(null); // MediaRecorder Ref
  var chunksRef = ur([]);
  var tmRef = ur(null);
  var streamRef = ur(null);
  var acRef = ur(null);

  /* ── Mulai Rekam Audio ── */
  function startRec(){
    if(!window.__AK){
      alert("Silakan isi API Key Groq di tab Pengaturan terlebih dahulu."); return;
    }
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      alert("Browser tidak mendukung perekaman mikrofon."); return;
    }

    setFin(""); setNotes(""); setTime(0); setSaved(false); setLdMsg("");
    chunksRef.current = [];

    navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
      streamRef.current = stream;
      
      // Setup MediaRecorder
      var mr = new MediaRecorder(stream);
      mr.ondataavailable = function(e){
        if(e.data.size > 0) chunksRef.current.push(e.data);
      };
      
      mr.onstop = function(){
        processAudioRecording();
      };

      mr.start(1000); // Kumpulkan chunk per 1 detik
      mrRef.current = mr;
      setRec(true);

      // Timer
      tmRef.current = setInterval(function(){ setTime(function(t){ return t+1; }); }, 1000);

      // Visualizer
      var ac = new (window.AudioContext||window.webkitAudioContext)();
      acRef.current = ac;
      var src = ac.createMediaStreamSource(stream);
      var an = ac.createAnalyser();
      an.fftSize = 2048; an.smoothingTimeConstant = 0.8;
      src.connect(an);
      setAn(an);

    }).catch(function(e){
      alert("Gagal mengakses mikrofon: " + e.message);
    });
  }

  /* ── Hentikan Rekaman ── */
  function stopRec(){
    if(mrRef.current && isRec) {
      mrRef.current.stop(); // Ini akan memicu mr.onstop di atas
    }
    setRec(false);
    clearInterval(tmRef.current);
    
    // Matikan mic
    if(streamRef.current){streamRef.current.getTracks().forEach(function(t){t.stop()}); streamRef.current=null;}
    if(acRef.current&&acRef.current.state!=="closed"){acRef.current.close();}
    setAn(null);
  }

  /* ── Proses API Groq (Transkrip + AI) ── */
  function processAudioRecording(){
    if(chunksRef.current.length === 0) return;
    
    setLdMsg("Mentranskripsi audio (Whisper)...");
    
    // Konversi chunks menjadi Blob audio
    var audioBlob = new Blob(chunksRef.current);
    var transkripTeks = "";

    transcribeAudio(audioBlob, set.lang, window.__AK)
      .then(function(text){
        if(!text.trim()) throw new Error("Suara tidak terdeteksi atau terlalu hening.");
        transkripTeks = text;
        setFin(text);
        setLdMsg("Merangkum poin penting...");
        return aiSummarize(text, set.lang, window.__AK);
      })
      .then(function(summary){
        setNotes(summary);
        setLdMsg(""); // Selesai
      })
      .catch(function(err){
        alert("Gagal memproses AI: " + err.message);
        setLdMsg("");
      });
  }

  /* ── Save to History ── */
  function saveMeeting(){
    if(!fin && !notes) return;
    DB.addHist({
      id: Date.now().toString(),
      date: new Date().toISOString(),
      duration: time,
      title: title || ("Rapat " + new Date().toLocaleDateString("id-ID",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})),
      transcript: fin,
      notes: notes
    });
    setSaved(true);
    alert("Notulen berhasil disimpan!");
  }

  /* ── Reset ── */
  function resetAll(){
    setFin(""); setNotes(""); setTime(0); setTitle(""); setSaved(false); setLdMsg("");
    chunksRef.current = [];
  }

  return h`<div>
    <div style=${{textAlign:"center",padding:"32px 16px 8px"}}>
      <div className="pill" style=${{background:"rgba(88,86,214,0.1)",color:"#5856D6",marginBottom:10}}>
        <${Ic} name="bot" size=${12} color="#5856D6"/>VOICE MEMO AI
      </div>
      <h1 style=${{fontWeight:800,fontSize:24,letterSpacing:"-0.5px",lineHeight:1.1}}>Smart Meeting Notes</h1>
      <p style=${{fontSize:12,color:"#8E8E93",marginTop:5}}>Rekam Rapat → Transkripsi → Ringkas</p>
    </div>

    <div style=${{maxWidth:480,margin:"0 auto",padding:"0 16px 16px"}}>

      <div className="gl" style=${{padding:20,textAlign:"center",marginBottom:14}}>
        <div style=${{display:"inline-flex",justifyContent:"center",alignItems:"center",width:80,height:80,borderRadius:40,background:isRec?"rgba(255,69,58,0.1)":"rgba(88,86,214,0.1)",color:isRec?"#FF453A":"#5856D6",animation:isRec?"ripple 2s infinite":"none",marginBottom:12}}>
          <${Ic} name=${isRec?"mic":"play"} size=${36}/>
        </div>

        <div style=${{fontSize:28,fontWeight:800,fontFamily:"'SF Mono',monospace",letterSpacing:-1,color:isRec?"#FF453A":"inherit",marginBottom:4}}>
          ${fmt(time)}
        </div>

        ${isRec && h`<div className="pill" style=${{background:"rgba(50,215,75,0.1)",color:"#32D74B",marginBottom:8}}>
          <div style=${{width:5,height:5,borderRadius:3,background:"#32D74B",animation:"pulse 1.2s infinite"}}/>
          Merekam Rapat...
        </div>`}

        ${isRec && analyser ? h`<div style=${{marginBottom:10,padding:"0 4px"}}><${LevelMeter} an=${analyser}/></div>` : null}

        ${!isRec && time===0 && h`<div style=${{marginBottom:10}}>
          <div style=${{fontSize:10,fontWeight:600,color:"#8E8E93",marginBottom:4}}>Judul Rapat (opsional)</div>
          <input class="fi" value=${title} onInput=${function(e){setTitle(e.target.value)}} placeholder="Cth: Weekly Standup" style=${{textAlign:"center"}}/>
        </div>`}

        <div style=${{display:"flex",gap:8}}>
          ${!isRec && time===0 ? h`<button onClick=${startRec} style=${{flex:1,padding:"14px",borderRadius:14,background:"linear-gradient(135deg,#5856D6,#7B79E8)",color:"#FFF",border:"none",fontSize:15,fontWeight:600,boxShadow:"0 6px 20px rgba(88,86,214,0.25)"}}>
            <span style=${{display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><${Ic} name="mic" size=${18} color="#FFF"/>Mulai Rekam</span>
          </button>` : null}

          ${isRec ? h`<button onClick=${stopRec} style=${{flex:1,padding:"14px",borderRadius:14,background:"#FF453A",color:"#FFF",border:"none",fontSize:15,fontWeight:600}}>
            <span style=${{display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><${Ic} name="stop" size=${18} color="#FFF"/>Selesai & Proses Teks</span>
          </button>` : null}

          ${!isRec && time>0 && !saved && !ldMsg ? h`<button onClick=${saveMeeting} style=${{flex:1,padding:"14px",borderRadius:14,background:"#32D74B",color:"#FFF",border:"none",fontSize:15,fontWeight:600}}>
            <span style=${{display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><${Ic} name="check" size=${18} color="#FFF"/>Simpan Notulen</span>
          </button>` : null}

          ${!isRec && time>0 && !ldMsg ? h`<button onClick=${resetAll} style=${{padding:"14px 18px",borderRadius:14,background:"rgba(0,0,0,0.04)",color:"#8E8E93",border:"1px solid rgba(0,0,0,0.06)",fontSize:15,fontWeight:600}}>Baru</button>` : null}
        </div>
      </div>

      ${ldMsg ? h`<div className="gl" style=${{padding:20,marginBottom:14,textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div className="spinner" style=${{marginBottom:12}}></div>
        <div style=${{fontWeight:600,fontSize:14,color:"#5856D6"}}>${ldMsg}</div>
        <div style=${{fontSize:11,color:"#8E8E93",marginTop:4}}>Proses ini membutuhkan waktu tergantung durasi rekaman...</div>
      </div>` : null}

      ${notes && !ldMsg ? h`<div>
        <div className="pill" style=${{background:"rgba(191,90,242,0.1)",color:"#BF5AF2",marginBottom:10}}>
          <${Ic} name="sparkle" size=${11} color="#BF5AF2"/>Poin Notulen AI
        </div>
        <div className="card-note">
           <div style=${{fontSize:14,lineHeight:1.6,color:"#1C1C1E",whiteSpace:"pre-wrap"}}>${notes}</div>
        </div>
      </div>` : null}

      ${fin && !ldMsg ? h`<div style=${{marginBottom:14,marginTop:10}}>
        <div className="pill" style=${{background:"rgba(88,86,214,0.1)",color:"#5856D6",marginBottom:10}}>
          <${Ic} name="text" size=${11} color="#5856D6"/>Transkrip Penuh (Whisper)
        </div>
        <div className="gl" style=${{padding:16,maxHeight:250,overflowY:"auto",background:"rgba(255,255,255,0.9)"}}>
          <span style=${{fontSize:14,lineHeight:1.6,color:"#1C1C1E"}}>${fin}</span>
        </div>
      </div>` : null}

      ${!isRec && time===0 ? h`<div className="gl" style=${{padding:16,marginBottom:14}}>
        <div style=${{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <div style=${{width:28,height:28,borderRadius:8,background:"rgba(88,86,214,0.1)",display:"flex",alignItems:"center",justifyContent:"center",color:"#5856D6"}}><${Ic} name="settings" size=${15}/></div>
          <span style=${{fontWeight:600,fontSize:13}}>Pengaturan Bahasa</span>
        </div>
        <div style=${{display:"flex",gap:8}}>
           ${[["id-ID","Indonesia"],["en-US","English"]].map(function(l){
             var on=set.lang===l[0];
             return h`<button key=${l[0]} onClick=${function(){updSet("lang",l[0])}} style=${{flex:1,padding:"8px",borderRadius:8,border:"1px solid "+(on?"rgba(88,86,214,0.3)":"rgba(0,0,0,0.08)"),background:on?"rgba(88,86,214,0.08)":"rgba(255,255,255,0.5)",fontSize:12,fontWeight:600,color:on?"#5856D6":"#8E8E93",fontFamily:"inherit"}}>${l[1]}</button>`;
           })}
        </div>
      </div>` : null}

      ${!window.__AK && !isRec && time===0 ? h`<div className="gl" style=${{padding:14,marginTop:6,background:"rgba(255,159,10,0.05)",border:"1px solid rgba(255,159,10,0.12)"}}>
        <div style=${{display:"flex",alignItems:"center",gap:8}}>
          <${Ic} name="alert" size=${16} color="#FF9F0A"/>
          <div>
            <div style=${{fontSize:12,fontWeight:600,color:"#FF9F0A"}}>API Key Groq belum diatur</div>
            <div style=${{fontSize:11,color:"#8E8E93",marginTop:1}}>Buka tab Pengaturan untuk memasukkan API Key.</div>
          </div>
        </div>
      </div>` : null}

    </div>
  </div>`;
}

/* ═══════════════════════
   TAB: RIWAYAT
   ═══════════════════════ */
function HistTab(){
  var _h=us(DB.get().history), hist=_h[0], setH=_h[1];
  var _open=us(null), openId=_open[0], setOpen=_open[1];

  function refresh(){setH(DB.get().history)}
  function del(id){if(confirm("Hapus notulen ini?")){DB.delHist(id);refresh()}}
  
  if(!hist.length) return h`<div style=${{padding:"60px 20px",textAlign:"center"}}>
    <${Ic} name="file" size=${48} color="#C7C7CC" sw=${1}/>
    <div style=${{fontSize:16,fontWeight:600,color:"#8E8E93",marginTop:16}}>Belum ada notulen</div>
    <div style=${{fontSize:13,color:"#C7C7CC",marginTop:4}}>Rapat yang disimpan muncul di sini.</div>
  </div>`;

  return h`<div style=${{padding:"16px"}}>
    <h2 style=${{fontSize:20,fontWeight:800,marginBottom:14}}>Riwayat Rapat</h2>
    ${hist.map(function(item){
      var isOpen = openId===item.id;
      return h`<div key=${item.id} className="gl" style=${{marginBottom:10,overflow:"hidden",background:"#FFF"}}>
        <div onClick=${function(){setOpen(isOpen?null:item.id)}} style=${{padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
          <div style=${{width:38,height:38,borderRadius:10,background:"rgba(88,86,214,0.08)",display:"flex",alignItems:"center",justifyContent:"center",color:"#5856D6",flexShrink:0}}><${Ic} name="file" size=${18}/></div>
          <div style=${{flex:1,minWidth:0}}>
            <div style=${{fontWeight:600,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${item.title||"Rapat"}</div>
            <div style=${{fontSize:11,color:"#8E8E93",marginTop:1}}>
              ${new Date(item.date).toLocaleDateString("id-ID",{day:"numeric",month:"short",year:"numeric"})} · ${fmt(item.duration)}
            </div>
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C7C7CC" strokeWidth="2" style=${{transform:isOpen?"rotate(90deg)":"none",transition:"0.2s"}}><path d="M9 18l6-6-6-6"/></svg>
        </div>

        ${isOpen ? h`<div style=${{padding:"0 16px 16px",animation:"fadeIn .2s"}}>
          <div style=${{display:"flex",gap:4,marginBottom:12,flexWrap:"wrap"}}>
            <button onClick=${function(e){e.stopPropagation();del(item.id)}} style=${{display:"inline-flex",alignItems:"center",gap:4,padding:"6px 12px",borderRadius:8,border:"1px solid rgba(255,69,58,0.12)",background:"rgba(255,69,58,0.04)",color:"#FF453A",fontSize:11,fontWeight:600,fontFamily:"inherit"}}>
              <${Ic} name="trash" size=${12} color="#FF453A"/>Hapus
            </button>
          </div>

          ${item.notes ? h`<div style=${{marginBottom:12}}>
            <div style=${{fontSize:10,fontWeight:700,color:"#BF5AF2",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:6,display:"flex",alignItems:"center",gap:4}}>
              <${Ic} name="sparkle" size=${12} color="#BF5AF2"/>Ringkasan AI
            </div>
            <div className="card-note">
              <div style=${{fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap"}}>${item.notes}</div>
            </div>
          </div>` : null}

          <div>
            <div style=${{fontSize:10,fontWeight:700,color:"#8E8E93",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:4}}>Transkrip Penuh</div>
            <div style=${{maxHeight:250,overflowY:"auto",background:"rgba(0,0,0,0.02)",borderRadius:12,padding:12,fontSize:13,lineHeight:1.5,color:"#48484A"}}>
              ${item.transcript || "(kosong)"}
            </div>
          </div>
        </div>` : null}
      </div>`;
    })}
  </div>`;
}

/* ═══════════════════════
   TAB: PENGATURAN
   ═══════════════════════ */
function SetTab(p){
  var set=p.set, updSet=p.updSet;
  var _sk=us(false), sk=_sk[0], sSk=_sk[1];

  return h`<div style=${{padding:"16px"}}>
    <div style=${{fontWeight:700,fontSize:17,marginBottom:12}}>Pengaturan</div>

    <div className="gl" style=${{padding:16,marginBottom:12}}>
      <div style=${{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <div style=${{width:28,height:28,borderRadius:8,background:"rgba(88,86,214,0.1)",display:"flex",alignItems:"center",justifyContent:"center",color:"#5856D6"}}><${Ic} name="key" size=${15}/></div>
        <span style=${{fontWeight:600,fontSize:14}}>API Key</span>
      </div>

      <div>
        <div style=${{fontSize:10,fontWeight:600,color:"#8E8E93",marginBottom:3}}>Groq API Key</div>
        <div style=${{position:"relative"}}>
          <input class="fi" type=${sk?"text":"password"} placeholder="gsk_..." value=${set.key} onInput=${function(e){updSet("key",e.target.value)}} style=${{paddingRight:40}}/>
          <button onClick=${function(){sSk(!sk)}} style=${{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",border:"none",background:"transparent",padding:4}}>
            <${Ic} name="eye" size=${14} color="#C7C7CC"/>
          </button>
        </div>
        ${set.key ? h`<div style=${{fontSize:10,color:"#32D74B",marginTop:4,display:"flex",alignItems:"center",gap:3}}>
          <${Ic} name="check" size=${10} color="#32D74B"/>Key tersimpan
        </div>` : null}
        <div style=${{fontSize:11,color:"#C7C7CC",marginTop:6}}>Daftar gratis di console.groq.com</div>
      </div>
    </div>

    <div className="gl" style=${{padding:16}}>
      <div style=${{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <div style=${{width:28,height:28,borderRadius:8,background:"rgba(88,86,214,0.1)",display:"flex",alignItems:"center",justifyContent:"center",color:"#5856D6"}}><${Ic} name="bot" size=${15}/></div>
        <span style=${{fontWeight:600,fontSize:14}}>Tentang</span>
      </div>
      <div style=${{fontSize:12,color:"#636366",lineHeight:1.6}}>Notulen AI merekam suara (MediaRecorder), mentranskripsinya dengan Groq Whisper, dan meringkas poin penting menggunakan LLM (Llama).</div>
      <div style=${{marginTop:8,fontSize:11,color:"#8E8E93"}}>v5.0 · Voice Memo Mode (iOS Safe)</div>
    </div>
  </div>`;
}

/* ═══════════════════════
   MAIN APP
   ═══════════════════════ */
function App(){
  var _tab=us("rec"), tab=_tab[0], setTab=_tab[1];
  var _set=us(DB.getSet()), settings=_set[0], setSettings=_set[1];

  ue(function(){ window.__AK = settings.key; }, [settings.key]);

  function updSet(k,v){ DB.updSet(k,v); setSettings(DB.getSet()); }

  return h`<div>
    <div style=${{paddingTop:10}}>
      ${tab==="rec" ? h`<${RecTab} set=${settings} updSet=${updSet}/>` : null}
      ${tab==="hist" ? h`<${HistTab}/>` : null}
      ${tab==="set" ? h`<${SetTab} set=${settings} updSet=${updSet}/>` : null}
    </div>

    <div className="btab">
      ${[["rec","mic","Rekam"],["hist","file","Riwayat"],["set","settings","Pengaturan"]].map(function(t){
        return h`<button key=${t[0]} className=${tab===t[0]?"on":""} onClick=${function(){setTab(t[0])}}>
          <${Ic} name=${t[1]} size=${20} color=${tab===t[0]?"#5856D6":"#8E8E93"}/>${t[2]}
        </button>`;
      })}
    </div>
  </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(h`<${App}/>`);
</script>
</body>
</html>
